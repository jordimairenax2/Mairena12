<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jordi y su novia hermosa 🌷</title>
    <meta
      name="description"
      content="Página romántica con árbol en forma de corazón, tulipanes amarillos, atardecer, luna creciente, dos muñequitos y pollito animado."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="scene">
      <header class="title-wrap">
        <h1>Jordi y su novia hermosa y Efrain viendo un atardecer</h1>
        <p class="subtitle">Con tulipanes, luna creciente y mucho amor.</p>
      </header>

      <section class="world" aria-label="Escena romántica con árbol de tulipanes">
        <div class="moon crescent"></div>
        <div class="heart-cloud heart-cloud-a"></div>
        <div class="heart-cloud heart-cloud-b"></div>

        <div class="tree" id="tree">
          <div class="trunk"></div>
          <div class="branches" id="branches"></div>
          <div class="flowers" id="flowers"></div>
        </div>

        <div class="couple">
          <div class="doll">
            <div class="head"></div>
            <div class="body dress"></div>
            <p>Yaloha</p>
          </div>
          <div class="doll">
            <div class="head"></div>
            <div class="body suit"></div>
            <p>Jordi</p>
          </div>
          <div class="chicken-wrap">
            <div class="chicken" aria-label="pollito animado">
              <div class="crest"></div>
              <div class="eye"></div>
              <div class="beak"></div>
            </div>
            <p class="chicken-tag">Benjamin</p>
          </div>
          <p class="chicken-names">Benjamin · Yaloha · Jordi</p>
        </div>

        <p class="love-note">
          Nunca me voy a aburrir de decirte que te amoo muchoo mi vidita.
          <span>💖 💗 💞 💓 💘 💝 💕 💟 💘 💗 💞 💓</span>
        </p>

        <div class="ground"></div>
        <div id="sparkles" class="sparkles"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
