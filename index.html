<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jordi, Yaloa y Efrain viendo el atardecer</title>
    <meta
      name="description"
      content="Jordi, Yaloa y Efrain viendo el atardecer con tulipanes, luna creciente y una escena romántica animada."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="scene">
      <header class="title-wrap">
        <p class="top-note">Dice Jordi que te ama de jigante desde mi casa hasta Peru en la moto de paisa 💖🏍️</p>
        <h1>Jordi, Yaloa y Efrain viendo un atardecer</h1>
        <p class="subtitle"></p>
      </header>

      <section class="world" aria-label="Jordi, Yaloa y Efrain disfrutando el atardecer">
        <div class="moon crescent"></div>
        <div class="heart-cloud heart-cloud-a"></div>
        <div class="heart-cloud heart-cloud-b"></div>
        <p class="center-note">Nunca me cansare de decirte lo mucho que te amo ❤️💘💞</p>

        <div class="tree" id="tree">
          <div class="trunk"></div>
          <div class="branches" id="branches"></div>
          <div class="flowers" id="flowers"></div>
        </div>

        <div class="couple">
          <div class="doll">
            <div class="head"></div>
            <div class="body dress"></div>
            <p>Yaloa</p>
          </div>
          <div class="doll">
            <div class="head"></div>
            <div class="body suit"></div>
            <p>Jordi</p>
          </div>
          <div class="chicken-wrap">
            <div class="chicken" aria-label="pollito animado">
              <div class="crest"></div>
              <div class="eye"></div>
              <div class="beak"></div>
            </div>
            <p class="chicken-tag">Benjamin</p>
          </div>
          <p class="chicken-names">Benjamin · Yaloa · Jordi</p>
        </div>

        <div class="ground"></div>
        <div id="sparkles" class="sparkles"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
