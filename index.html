<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tulipanes Amarillos para Yaloa y Jordi 💛</title>
    <meta
      name="description"
      content="Página romántica con un árbol de tulipanes amarillos, ramas en forma de corazón, dos muñequitos y un pollito animado."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="scene">
      <header class="title-wrap">
        <p class="tag">Un detalle hecho con amor</p>
        <h1>Yaloa 💛 Jordi</h1>
        <p class="subtitle">Un árbol de tulipanes amarillos para una historia bonita.</p>
      </header>

      <section class="world" aria-label="Escena romántica con árbol de tulipanes amarillos">
        <div class="moon"></div>
        <div class="heart-cloud heart-cloud-a"></div>
        <div class="heart-cloud heart-cloud-b"></div>

        <div class="tree" id="tree">
          <div class="trunk"></div>
          <div class="branch-heart branch-left"></div>
          <div class="branch-heart branch-right"></div>
          <div class="branch-heart branch-inner-left"></div>
          <div class="branch-heart branch-inner-right"></div>
          <div class="branch-heart branch-top"></div>
          <div class="flowers" id="flowers"></div>
        </div>

        <div class="couple">
          <div class="doll">
            <div class="head"></div>
            <div class="body dress"></div>
            <p>Yaloa</p>
          </div>
          <div class="doll">
            <div class="head"></div>
            <div class="body suit"></div>
            <p>Jordi</p>
          </div>
          <div class="chicken" aria-label="pollito animado">
            <div class="crest"></div>
            <div class="eye"></div>
            <div class="beak"></div>
          </div>
          <p class="chicken-names">Benjamin · Yaloa · Jordi</p>
        </div>

        <p class="love-note">
          Nunca me voy a aburrir de decirte que te amooo muchoo, mi vidita 💛
          <span>💛💛💛💛💛</span>
        </p>

        <div class="ground"></div>
        <div id="sparkles" class="sparkles"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
